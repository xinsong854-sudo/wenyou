        .bg-hospital { background: linear-gradient(180deg, #3a3a5c 0%, #1a1a2e 100%); }
        .bg-secret { background: linear-gradient(180deg, #4a0000 0%, #1a0000 100%); }
        .bg-ending { background: #000; }
        #dialogue-box { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 1000px; background: rgba(20,20,40,0.95); border: 2px solid #4a4a6a; border-radius: 15px; padding: 20px 30px; z-index: 10; }
        #speaker-name { font-size: 20px; font-weight: bold; color: #7a7aaa; margin-bottom: 10px; }
        #dialogue-text { font-size: 18px; line-height: 1.8; color: #fff; min-height: 60px; }
        #choices-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 20; display: none; flex-direction: column; gap: 15px; width: 80%; max-width: 600px; }
        .choice-btn { background: linear-gradient(180deg, #3a3a5a 0%, #2a2a4a 100%); border: 2px solid #5a5a7a; border-radius: 10px; padding: 20px; color: #fff; font-size: 18px; cursor: pointer; text-align: center; }
        .choice-btn:hover { background: linear-gradient(180deg, #4a4a6a 0%, #3a3a5a 100%); border-color: #7a7aaa; }
        #menu-buttons { position: absolute; top: 20px; right: 20px; z-index: 30; display: flex; gap: 10px; }
        .menu-btn { background: rgba(30,30,50,0.8); border: 1px solid #5a5a7a; border-radius: 5px; padding: 8px 15px; color: #aaa; cursor: pointer; }
        .menu-btn:hover { background: rgba(50,50,80,0.9); color: #fff; }
        #save-load-panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(20,20,40,0.98); border: 2px solid #5a5a7a; border-radius: 15px; padding: 30px; z-index: 40; display: none; width: 90%; max-width: 600px; }

        .save-slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .save-slot { background: rgba(30,30,50,0.6); border: 1px solid #4a4a6a; border-radius: 8px; padding: 15px; cursor: pointer; min-height: 80px; }
        .save-slot:hover { background: rgba(50,50,80,0.8); }
        .panel-buttons { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .panel-btn { background: #3a3a5a; border: 1px solid #5a5a7a; border-radius: 8px; padding: 10px 25px; color: #fff; cursor: pointer; }
        #title-screen { position: absolute; width: 100%; height: 100%; background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0a0a1a 100%); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #title-screen h1 { font-size: 48px; color: #7a7aaa; margin-bottom: 20px; }
        #title-screen .subtitle { font-size: 18px; color: #5a5a7a; margin-bottom: 20px; }
        #name-input-container { display: none; flex-direction: column; align-items: center; margin-bottom: 20px; }
        #name-input-container.show { display: flex; }

        .name-hint { font-size: 12px; color: #5a5a7a; margin-top: 10px; }
        .title-btn { background: #3a3a5a; border: 2px solid #5a5a7a; border-radius: 10px; padding: 15px 50px; color: #fff; font-size: 18px; cursor: pointer; margin: 10px; }
        .title-btn:hover { background: #4a4a6a; border-color: #7a7aaa; }
        #ending-screen { position: absolute; width: 100%; height: 100%; background: #000; z-index: 50; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        #ending-screen h2 { font-size: 36px; color: #7a7aaa; margin-bottom: 20px; text-align: center; }
        #ending-screen .ending-text { font-size: 18px; line-height: 2; color: #aaa; max-width: 700px; text-align: center; }
        .ending-bad { color: #ff6b6b; }
        .ending-normal { color: #4ecdc4; }
        .ending-true { color: #ffe66d; }
        #continue-indicator { position: absolute; bottom: 15px; right: 30px; font-size: 24px; color: #7a7aaa; animation: blink 1s infinite; }
        @keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0.3; } }
        .rules-box { background: rgba(60,40,40,0.9); border: 2px solid #8b0000; padding: 15px; margin: 10px 0; border-radius: 8px; }
        .rules-box h3 { color: #ff6b6b; margin-bottom: 10px; }
        .rules-box ul { color: #aaa; padding-left: 20px; }
        .rules-box li { margin: 5px 0; }
        /* 章节标题 */
        .chapter-title { 
            font-size: 24px; 
            color: #4ecdc4; 
            text-align: center; 
            margin: 20px 0; 
            padding: 15px;
            background: linear-gradient(90deg, transparent, rgba(78,205,196,0.1), transparent);
            border-left: 3px solid #4ecdc4;
            border-right: 3px solid #4ecdc4;
        }
        /* 内心独白 */
        .inner-thought { 
            color: #9a9aaa; 
            font-style: italic; 
            border-left: 2px solid #5a5a7a;
            padding-left: 15px;
            margin: 10px 0;
        }
        /* 重要信息 */
        .important-text { 
            color: #ff6b6b; 
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255,107,107,0.5);
        }
        /* 神秘对话 */
        .mystery-text { 
            color: #a855f7;
            text-shadow: 0 0 5px rgba(168,85,247,0.3);
        }
        /* 伪人对话 */
        .pseudo-text { 
            color: #7a7aaa;
            letter-spacing: 2px;
        }
        /* 时间地点标签 */
        .location-tag {
            font-size: 12px;
            color: #5a5a7a;
            background: rgba(90,90,114,0.2);
            padding: 5px 10px;
            border-radius: 5px;
            display: inline-block;
            margin-bottom: 10px;
        }
        /* 心跳效果 */
        .heartbeat { 
            animation: heartbeat 1.5s infinite; 
        }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            10% { transform: scale(1.02); }
            20% { transform: scale(1); }
            30% { transform: scale(1.02); }
            40% { transform: scale(1); }
        }
        /* 模糊效果 */
        .blur-text {
            filter: blur(3px);
            transition: filter 0.5s;
        }
        .blur-text:hover {
            filter: blur(0);
        }
        /* 打字机效果容器 */
        .typewriter {
            overflow: hidden;
            border-right: 2px solid #7a7aaa;
            white-space: nowrap;
            animation: typing 3s steps(30, end);
        }
        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        /* 视觉增强 */
        .glitch-text { animation: glitch 0.3s infinite; display: inline-block; }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        .pulse-text { animation: pulse 2s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .danger-zone { background: rgba(139, 0, 0, 0.3); animation: dangerPulse 3s infinite; }
        @keyframes dangerPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(139, 0, 0, 0.5); }
            50% { box-shadow: 0 0 40px rgba(139, 0, 0, 0.8); }
        }
        .safe-zone { background: rgba(78, 205, 196, 0.2); }
        .typing-cursor::after { content: '▋'; animation: blink 0.7s infinite; color: #7a7aaa; }
        .scene-transition { animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 手机界面 */
        #phone-ui { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 320px; height: 600px; background: #1a1a2e; border: 3px solid #4a4a6a; border-radius: 20px; z-index: 50; overflow: hidden; box-shadow: 0 0 30px rgba(0,0,0,0.8); }

        .phone-header { background: #2a2a4a; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        .phone-signal { font-size: 12px; color: #7a7aaa; }
        .phone-app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 10px; }
        .phone-app { background: #3a3a5a; border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; font-size: 24px; }
        .phone-app:hover { background: #4a4a6a; }
        .phone-app-label { font-size: 10px; color: #aaa; margin-top: 5px; }
        .phone-msg-list { padding: 10px; }
        .phone-msg { background: #2a2a4a; border-radius: 8px; padding: 10px; margin-bottom: 8px; font-size: 12px; }
        .phone-msg.unread { border-left: 3px solid #4ecdc4; }
        .phone-btn { background: #4a4a6a; border: none; border-radius: 8px; padding: 10px; color: #fff; width: 100%; margin-top: 10px; cursor: pointer; }
        .phone-inventory { padding: 10px; }
        .phone-item { background: #2a2a4a; border-radius: 8px; padding: 10px; margin-bottom: 8px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
        .phone-item .item-name { color: #fff; }
        .phone-item .item-desc { color: #7a7aaa; font-size: 11px; }
        .phone-close { position: absolute; top: 10px; right: 10px; background: #5a3a3a; border: none; color: #fff; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 16px; }
        .phone-tab-bar { position: absolute; bottom: 0; width: 100%; height: 50px; background: #2a2a4a; display: flex; justify-content: space-around; align-items: center; }
        .phone-tab { color: #7a7aaa; font-size: 20px; cursor: pointer; padding: 5px; }
        .phone-tab.active { color: #4ecdc4; }

    </style>
</head>
<body>
<div id="game-container">
    <div id="background" class="bg-office"></div>
    <div id="menu-buttons">
        <button class="menu-btn" onclick="showSavePanel()">💾 存档</button>
        <button class="menu-btn" onclick="showLoadPanel()">📂 读档</button>
        <button class="menu-btn" onclick="showTitle()">🏠 标题</button>
    </div>
    
    <div id="intro-overlay" style="display:none;">
        <div id="intro-text"></div>
    </div>
    <div id="title-screen">
        <h1>🎭 伪人大本营</h1>
        <p class="subtitle">你能识破伪装者吗？</p>
        <div id="name-input-container">
            <input type="text" id="player-name-input" placeholder="输入你的名字" maxlength="10">
            <button class="title-btn" onclick="confirmName()">✅ 确认</button>
            <p class="name-hint">💡 输入特定角色名有彩蛋哦~</p>
        </div>
        <button class="title-btn" id="start-btn" onclick="showNameInput()">▶️ 开始游戏</button>
        <button class="title-btn" onclick="showLoadPanel()">📂 继续游戏</button>
    </div>
    <div id="ending-screen">
        <h2 id="ending-title"></h2>
        <p class="ending-text" id="ending-content"></p>
        <button class="title-btn" onclick="showTitle()">🔄 重新开始</button>
    </div>
    <div id="dialogue-box" style="display:none;" onclick="nextDialogue()">
        <div id="speaker-name"></div>
        <div id="dialogue-text"></div>
        <div id="continue-indicator">▼</div>
    </div>
    <div id="choices-container"></div>
    
    <div id="phone-ui">

        <div id="phone-screen">
            <div class="phone-header">

                    <div class="phone-app" onclick="showPhoneTab('notes')">📝<div class="phone-app-label">笔记</div></div>
                    <div class="phone-app" onclick="showPhoneTab('map')">🗺️<div class="phone-app-label">地图</div></div>
                </div>
            </div>
        </div>
    </div>
<div id="save-load-panel">
        <h2 id="panel-title">存档</h2>
        <div class="save-slots" id="save-slots"></div>
        <div class="panel-buttons">
            <button class="panel-btn" onclick="hidePanel()">关闭</button>

</div>

// 道具系统
let inventory = [];
let phoneUnread = 0;

// 初始道具
const startingItems = [
    { id: 'note', name: '📜 生存指南', desc: '伪人识别方法和生存规则' },
    { id: 'phone', name: '📱 手机', desc: '可以联系猎人和查看消息' }
];

function initInventory() {
    inventory = [...startingItems];
}

function addItem(item) {
    if (!inventory.find(i => i.id === item.id)) {
        inventory.push(item);
        phoneUnread++;
        updatePhoneTime();
    }
}

function showPhone() {
    document.getElementById('phone-ui').style.display = 'block';
    updatePhoneTime();
    showPhoneTab('messages');
}

function closePhone() {
    document.getElementById('phone-ui').style.display = 'none';
}

function updatePhoneTime() {
    const now = new Date();
    const time = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
    document.getElementById('phone-time').textContent = time;
}

function showPhoneTab(tab) {
    const content = document.getElementById('phone-content');
    
    // 更新标签状态
    document.querySelectorAll('.phone-tab').forEach(t => t.classList.remove('active'));
    
    if (tab === 'messages') {
        content.innerHTML = `
            <div class="phone-msg-list">
                <h3 style="color:#7a7aaa;margin-bottom:10px;">📬 消息</h3>
                ${inventory.some(i => i.id === 'note') ? `
                <div class="phone-msg unread">
                    <strong>神秘人</strong><br>
                    记住：伪人会模仿人类，但眨眼频率异常。不要单独去旧医院。
                </div>` : ''}
                ${inventory.some(i => i.id === 'hunter_contact') ? `
                <div class="phone-msg unread">
                    <strong>猎人组织</strong><br>
                    我们已收到你的信号。旧医院地下室，今晚 10 点。
                </div>` : ''}
                ${inventory.length <= 2 ? `
                <div class="phone-msg">
                    <strong>系统</strong><br>
                    欢迎来到伪人大本营。你的选择将决定命运。
                </div>` : ''}
            </div>
        `;
    } else if (tab === 'inventory') {
        content.innerHTML = `
            <div class="phone-inventory">
                <h3 style="color:#7a7aaa;margin-bottom:10px;">🎒 道具</h3>
                ${inventory.map(item => `
                    <div class="phone-item">
                        <div>
                            <div class="item-name">${item.name}</div>
                            <div class="item-desc">${item.desc}</div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    } else if (tab === 'notes') {
        content.innerHTML = `
            <div class="phone-msg-list">
                <h3 style="color:#7a7aaa;margin-bottom:10px;">📝 笔记</h3>
                <div class="phone-msg">
                    <strong>伪人识别方法</strong><br>
                    1. 眨眼频率异常（太规律）<br>
                    2. 说话重复关键词<br>
                    3. 眼神没有情感<br>
                    4. 行为机械化
                </div>
                <div class="phone-msg">
                    <strong>生存规则</strong><br>
                    1. 不要单独行动<br>
                    2. 不要去旧医院<br>
                    3. 发现被跟踪去人多的地方<br>
                    4. 不要报警（他们不会相信）
                </div>
            </div>
        `;
    } else if (tab === 'map') {
        content.innerHTML = `
            <div class="phone-msg-list">
                <h3 style="color:#7a7aaa;margin-bottom:10px;">🗺️ 地图</h3>
                <div class="phone-msg">
                    <strong>已知地点</strong><br>
                    🏢 公司 - 起点<br>
                    🏠 家 - 安全屋（暂时）<br>
                    🏥 旧医院 - 伪人大本营（危险！）<br>
                    🚇 地铁站 - 可逃离<br>
                    🏪 商场 - 人多安全
                </div>
            </div>
        `;
    }
}

// 在菜单中添加手机按钮
function addPhoneButton() {
    const menuButtons = document.getElementById('menu-buttons');
    if (!document.getElementById('phone-btn')) {
        const phoneBtn = document.createElement('button');
        phoneBtn.id = 'phone-btn';
        phoneBtn.className = 'menu-btn';
        phoneBtn.textContent = '📱 手机';
        phoneBtn.onclick = (e) => { e.stopPropagation(); showPhone(); };
        menuButtons.insertBefore(phoneBtn, menuButtons.firstChild);
    }
}

function confirmName() {
    const input = document.getElementById('player-name-input');
    const name = input.value.trim() || '林晓';
    playerName = name;
    
    // 检查彩蛋
    for (const [role, title] of Object.entries(easterEggRoles)) {
        if (name.includes(role)) {
            isEasterEgg = true;
            easterEggRole = role;
            alert('🎉 彩蛋解锁！\n你选择扮演：' + role + '（' + title + '）\n游戏中会有特殊对话哦~');
            break;
        }
    }
    
    document.getElementById('title-screen').style.display = 'none';
    document.getElementById('dialogue-box').style.display = 'block';
    loadScene('start');
}

function loadScene(sceneId) {
    const scene = scenes[sceneId];
    if (!scene) {
        console.error('Scene not found:', sceneId);
        return;
    }
    currentScene = sceneId;
    document.getElementById('background').className = scene.bg;
    dialogueIndex = 0;
    showDialogue();
}

function showDialogue() {
    const scene = scenes[currentScene];
    if (dialogueIndex >= scene.dialogues.length) {
        if (scene.ending) {
            showEnding(scene);
        } else if (scene.choices) {
            showChoices(scene.choices);
        }
        return;
    }
    let dialogue = scene.dialogues[dialogueIndex];
    
    // 替换主角名字
    let speaker = dialogue.speaker;
    let text = dialogue.text;
    if (speaker === '我' || speaker === '林晓') {
        speaker = playerName;
    }
    text = text.replace(/我/g, playerName);
    text = text.replace(/林晓/g, playerName);
    
    // 特殊文本样式处理
    if (speaker === '') {
        // 章节标题/旁白
        text = '<span class="chapter-title">' + text + '</span>';
    } else if (text.includes('【') && text.includes('】')) {
        // 重要信息
        text = text.replace(/【([^】]+)】/g, '<span class="important-text">【$1】</span>');
    } else if (speaker === '？？？' || speaker === '神秘人') {
        // 神秘对话
        text = '<span class="mystery-text">' + text + '</span>';
    } else if (['伪人', '张明', '王医生'].includes(speaker) && scene.bg === 'bg-secret') {
        // 伪人对话（在大本营场景）
        text = '<span class="pseudo-text">' + text + '</span>';
    } else if (text.includes('（') && text.includes('）')) {
        // 内心独白/动作描写
        text = text.replace(/（([^）]+)）/g, '<span class="inner-thought">（$1）</span>');
    }
    
    // 彩蛋特殊对话（伪人大本营世界观）
    if (isEasterEgg && easterEggRole) {
        // 公寓/哨站相关
        if (['营长', '槐安', '公寓', '特洛菲', '洛洛', '化而为', '西瓜人', '涂改', '牺牲', '兔仙', '云蓝', '江安', '赫卡忒', '亚契', '荆千棘', '墨水夜', '石测', '大夜夜', '长喙', '红缇香', '伽纳罗丝', '笑颜', '小赤帽', '伊露', '春山抚子', '陆玖', 'Aurora', '伊莱亚斯', '落嵛', '绊', 'puzzle', '迷迭香', '桃桃', '玄弦若离', '忘光', '行粥', '江小楠', 'viole', '奥特娜特', '可可', '赫木祀夜', '恶堕莉莉丝', '泡泡', '月汐', '松下', '科拉松', '西西', '赫敏', '卜焕汣', '蠹鱼', '七点半', '渡潵', '零', '百合', '绯红晴'].includes(easterEggRole)) {
            text = '🏠【公寓住户】' + text + ' （这里是伪人的家...）';
        }
        // 猎人/黎守相关
        else if (['猎人', '黎守', '对伪课', '李雨'].includes(easterEggRole)) {
            text = '🔫【猎人/黎守】' + text + ' （保持警惕，检测伪人...）';
        }
        // 伪人相关
        else if (['伪人', '张明', '王医生', '多虫', '人魈', '凝胶', '拟人蝎'].includes(easterEggRole)) {

        }

            text = '🌐【组织成员】' + text + ' （为了组织的使命...）';
        }

        else if (['里界', '门', '伪物', '深破', 'X', '冷寂', '17.3 赫兹', '独允'].includes(easterEggRole)) {

}

function typeText(text) {
    isTyping = true;
    let index = 0;
    const element = document.getElementById('dialogue-text');
    element.textContent = '';
    typingTimer = setInterval(() => {
        if (index < text.length) {
            element.textContent += text[index];
            index++;
        } else {
            clearInterval(typingTimer);
            isTyping = false;
        }
    }, 30);
}

function nextDialogue() {
    if (isTyping) {
        clearInterval(typingTimer);
        document.getElementById('dialogue-text').textContent = currentText;
        isTyping = false;
        return;
    }
    dialogueIndex++;
    showDialogue();
}

        btn.onclick = () => {
            container.style.display = 'none';
            document.getElementById('dialogue-box').style.display = 'block';
            loadScene(choice.next);
        };
        container.appendChild(btn);
    });
}

function showEnding(scene) {
    document.getElementById('dialogue-box').style.display = 'none';
    document.getElementById('choices-container').style.display = 'none';
    const endingScreen = document.getElementById('ending-screen');
    
    let endingTitle = scene.endingTitle;
    let endingText = scene.endingText;
    
    // 替换结局中的"你"为玩家名字
    endingText = endingText.replace(/你/g, playerName);
    endingTitle = endingTitle.replace(/你/g, playerName);
    
    // 彩蛋特殊结局
    if (isEasterEgg) {
        endingTitle = '🎉 ' + endingTitle;
        endingText = '【彩蛋身份：' + easterEggRoles[easterEggRole] + '】\n\n' + endingText;
    }
    
    // 根据结局类型添加图标
    const typeIcons = { 'bad': '💀', 'normal': '🌅', 'true': '⭐' };
    const icon = typeIcons[scene.endingType] || '🎭';
    
    document.getElementById('ending-title').innerHTML = icon + ' ' + endingTitle;
    document.getElementById('ending-title').className = 'ending-' + scene.endingType;
    
    // 格式化结局文本，支持换行
    document.getElementById('ending-content').innerHTML = endingText.replace(/\n/g, '<br>');
    
    endingScreen.style.display = 'flex';
}

    document.getElementById('ending-screen').style.display = 'none';

}

function saveGame(slot) {
    const data = { 
        scene: currentScene, 
        dialogue: dialogueIndex, 
        time: new Date().toLocaleString(),
        playerName: playerName,
        isEasterEgg: isEasterEgg,
        easterEggRole: easterEggRole
    };
    localStorage.setItem('pseudoSave' + slot, JSON.stringify(data));
    renderSaveSlots();
}

function loadGame(slot) {
    const data = localStorage.getItem('pseudoSave' + slot);
    if (data) {
        const parsed = JSON.parse(data);
        playerName = parsed.playerName || '林晓';
        isEasterEgg = parsed.isEasterEgg || false;
        easterEggRole = parsed.easterEggRole || '';
        document.getElementById('title-screen').style.display = 'none';
        document.getElementById('dialogue-box').style.display = 'block';
        loadScene(parsed.scene);
        dialogueIndex = parsed.dialogue;
    }
}

function showSavePanel() {
    document.getElementById('panel-title').textContent = '存档';
    document.getElementById('save-load-panel').style.display = 'block';
    renderSaveSlots(true);
}

function showLoadPanel() {
    document.getElementById('panel-title').textContent = '读档';
    document.getElementById('save-load-panel').style.display = 'block';
    renderSaveSlots(false);
}

function hidePanel() {
    document.getElementById('save-load-panel').style.display = 'none';
}

function renderSaveSlots(isSave) {
    const container = document.getElementById('save-slots');
    container.innerHTML = '';
    for (let i = 1; i <= 6; i++) {
        const data = localStorage.getItem('pseudoSave' + i);
        const slot = document.createElement('div');
        slot.className = 'save-slot';
        if (data) {
            const parsed = JSON.parse(data);
            const eeTag = parsed.isEasterEgg ? ' 🎉' : '';
            slot.innerHTML = '<div class="slot-number">存档 ' + i + '</div><div class="slot-info">' + (parsed.playerName || '林晓') + eeTag + '</div><div class="slot-time">' + parsed.time + '</div>';
        } else {
            slot.innerHTML = '<div class="slot-number">存档 ' + i + '</div><div class="slot-info">空</div>';
        }
        slot.onclick = () => {
            if (isSave) saveGame(i);
            else loadGame(i);
            hidePanel();
        };
        container.appendChild(slot);
    }
}

        bg.classList.add('danger-zone');
    }
    // 安全场景
    if (['bg-home'].includes(sceneId)) {
        bg.classList.add('safe-zone');
    }
}

// 增强版 loadScene
const originalLoadScene = loadScene;
loadScene = function(sceneId) {
    const scene = scenes[sceneId];
    if (!scene) return;
    
    applyAtmosphere(scene.bg);
    originalLoadScene(sceneId);
};

</script>
