<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>伪人大本营 - 互动视觉小说</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #1a1a2e; color: #eee; overflow: hidden; height: 100vh; }
        #game-container { width: 100%; height: 100%; max-width: 1280px; max-height: 720px; margin: 0 auto; position: relative; }
        #background { position: absolute; width: 100%; height: 100%; transition: background 0.5s; }
        .bg-office { background: linear-gradient(180deg, #2d3436 0%, #1a1a2e 100%); }
        .bg-street { background: linear-gradient(180deg, #0c0c0c 0%, #1a1a2e 100%); }
        .bg-home { background: linear-gradient(180deg, #2d3436 0%, #0c0c0c 100%); }
        .bg-hospital { background: linear-gradient(180deg, #3a3a5c 0%, #1a1a2e 100%); }
        .bg-secret { background: linear-gradient(180deg, #4a0000 0%, #1a0000 100%); }
        .bg-ending { background: #000; }
        #dialogue-box { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 1000px; background: rgba(20,20,40,0.95); border: 2px solid #4a4a6a; border-radius: 15px; padding: 20px 30px; z-index: 10; }
        #speaker-name { font-size: 20px; font-weight: bold; color: #7a7aaa; margin-bottom: 10px; }
        #dialogue-text { font-size: 18px; line-height: 1.8; color: #fff; min-height: 60px; }
        #choices-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 20; display: none; flex-direction: column; gap: 15px; width: 80%; max-width: 600px; }
        .choice-btn { background: linear-gradient(180deg, #3a3a5a 0%, #2a2a4a 100%); border: 2px solid #5a5a7a; border-radius: 10px; padding: 20px; color: #fff; font-size: 18px; cursor: pointer; text-align: center; }
        .choice-btn:hover { background: linear-gradient(180deg, #4a4a6a 0%, #3a3a5a 100%); border-color: #7a7aaa; }
        #menu-buttons { position: absolute; top: 20px; right: 20px; z-index: 30; display: flex; gap: 10px; }
        .menu-btn { background: rgba(30,30,50,0.8); border: 1px solid #5a5a7a; border-radius: 5px; padding: 8px 15px; color: #aaa; cursor: pointer; }
        .menu-btn:hover { background: rgba(50,50,80,0.9); color: #fff; }
        #save-load-panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(20,20,40,0.98); border: 2px solid #5a5a7a; border-radius: 15px; padding: 30px; z-index: 40; display: none; width: 90%; max-width: 600px; }
        #save-load-panel h2 { color: #7a7aaa; margin-bottom: 20px; text-align: center; }
        .save-slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .save-slot { background: rgba(30,30,50,0.6); border: 1px solid #4a4a6a; border-radius: 8px; padding: 15px; cursor: pointer; min-height: 80px; }
        .save-slot:hover { background: rgba(50,50,80,0.8); }
        .panel-buttons { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .panel-btn { background: #3a3a5a; border: 1px solid #5a5a7a; border-radius: 8px; padding: 10px 25px; color: #fff; cursor: pointer; }
        #title-screen { position: absolute; width: 100%; height: 100%; background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0a0a1a 100%); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #title-screen h1 { font-size: 48px; color: #7a7aaa; margin-bottom: 20px; }
        #title-screen .subtitle { font-size: 18px; color: #5a5a7a; margin-bottom: 40px; }
        .title-btn { background: #3a3a5a; border: 2px solid #5a5a7a; border-radius: 10px; padding: 15px 50px; color: #fff; font-size: 18px; cursor: pointer; margin: 10px; }
        .title-btn:hover { background: #4a4a6a; border-color: #7a7aaa; }
        #ending-screen { position: absolute; width: 100%; height: 100%; background: #000; z-index: 50; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        #ending-screen h2 { font-size: 36px; color: #7a7aaa; margin-bottom: 20px; text-align: center; }
        #ending-screen .ending-text { font-size: 18px; line-height: 2; color: #aaa; max-width: 700px; text-align: center; }
        .ending-bad { color: #ff6b6b; }
        .ending-normal { color: #4ecdc4; }
        .ending-true { color: #ffe66d; }
        #continue-indicator { position: absolute; bottom: 15px; right: 30px; font-size: 24px; color: #7a7aaa; animation: blink 1s infinite; }
        @keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0.3; } }
        .rules-box { background: rgba(60,40,40,0.9); border: 2px solid #8b0000; padding: 15px; margin: 10px 0; border-radius: 8px; }
        .rules-box h3 { color: #ff6b6b; margin-bottom: 10px; }
        .rules-box ul { color: #aaa; padding-left: 20px; }
        .rules-box li { margin: 5px 0; }
    </style>
</head>
<body>
<div id="game-container">
    <div id="background" class="bg-office"></div>
    <div id="menu-buttons">
        <button class="menu-btn" onclick="showSavePanel()">💾 存档</button>
        <button class="menu-btn" onclick="showLoadPanel()">📂 读档</button>
        <button class="menu-btn" onclick="showTitle()">🏠 标题</button>
    </div>
    <div id="title-screen">
        <h1>🎭 伪人大本营</h1>
        <p class="subtitle">你能识破伪装者吗？</p>
        <button class="title-btn" onclick="startGame()">▶️ 开始游戏</button>
        <button class="title-btn" onclick="showLoadPanel()">📂 继续游戏</button>
    </div>
    <div id="ending-screen">
        <h2 id="ending-title"></h2>
        <p class="ending-text" id="ending-content"></p>
        <button class="title-btn" onclick="showTitle()">🔄 重新开始</button>
    </div>
    <div id="dialogue-box" style="display:none;" onclick="nextDialogue()">
        <div id="speaker-name"></div>
        <div id="dialogue-text"></div>
        <div id="continue-indicator">▼</div>
    </div>
    <div id="choices-container"></div>
    <div id="save-load-panel">
        <h2 id="panel-title">存档</h2>
        <div class="save-slots" id="save-slots"></div>
        <div class="panel-buttons">
            <button class="panel-btn" onclick="hidePanel()">关闭</button>
        </div>
    </div>
</div>
<script>
const scenes = {
    'start': {
        bg: 'bg-office',
        dialogues: [
            { speaker: '我', text: '我叫林晓，在这家公司工作三年了。' },
            { speaker: '我', text: '但最近...我发现同事们有些不对劲。' },
            { speaker: '我', text: '张明眨眼太规律了，像设定好的程序。李雨说话总是重复最后一句话。王医生...他的眼神太冷了。' },
            { speaker: '我', text: '直到那天，我在张明的桌子上发现了一张纸条...' }
        ],
        choices: [
            { text: '📄 查看纸条内容', next: 'read_note' }
        ]
    },
    'read_note': {
        bg: 'bg-office',
        dialogues: [
            { speaker: '纸条', text: '【生存指南】\n1. 伪人会模仿人类，但眨眼频率异常\n2. 他们说话会重复关键词\n3. 不要单独去旧医院\n4. 猎人组织联系方式：138****\n5. 如果发现被跟踪，去人多的地方' },
            { speaker: '我', text: '（我的手开始发抖...这上面写的，和张明的行为完全吻合！）' },
            { speaker: '张明', text: '林晓，你在看什么？' },
            { speaker: '我', text: '（他什么时候过来的？！）' }
        ],
        choices: [
            { text: '说是工作文件', next: 'fake_work' },
            { text: '直接询问纸条', next: 'ask_note' }
        ]
    },
    'fake_work': {
        bg: 'bg-office',
        dialogues: [
            { speaker: '我', text: '哦，是下周的会议资料。' },
            { speaker: '张明', text: '（他盯着我看了一会儿）...早点回去休息吧。' },
            { speaker: '我', text: '（他的眼神...完全没有人类的情感。）' },
            { speaker: '我', text: '（我必须离开这里，现在！）' }
        ],
        choices: [
            { text: '立刻离开公司', next: 'leave_company' },
            { text: '先回家拿东西', next: 'go_home_first' }
        ]
    },
    'ask_note': {
        bg: 'bg-office',
        dialogues: [
            { speaker: '我', text: '这张纸条...是你的？' },
            { speaker: '张明', text: '（他笑了，但笑容不达眼底）你发现了啊。' },
            { speaker: '张明', text: '那就没办法了。跟我们走一趟吧。' },
            { speaker: '我', text: '（他说"我们"？办公室里还有其他人？！）' }
        ],
        choices: [
            { text: '逃跑！', next: 'escape_office' },
            { text: '跟他们走', next: 'go_with_them' }
        ]
    },
    'leave_company': {
        bg: 'bg-street',
        dialogues: [
            { speaker: '我', text: '（我快步走出公司，不敢回头。）' },
            { speaker: '我', text: '（街上人来人往，但...这些人里有多少是伪人？）' },
            { speaker: '？？？', text: '你也发现了，对吧？' },
            { speaker: '我', text: '（一个戴帽子的神秘人出现在我旁边。）' }
        ],
        choices: [
            { text: '警惕地后退', next: 'be_careful' },
            { text: '询问他是谁', next: 'ask_who' }
        ]
    },
    'go_home_first': {
        bg: 'bg-home',
        dialogues: [
            { speaker: '我', text: '（我回到家，锁好门。）' },
            { speaker: '我', text: '（我需要冷静下来，想想发生了什么。）' },
            { speaker: '手机', text: '【未知号码】别相信任何人。旧医院，今晚 10 点。' },
            { speaker: '我', text: '（这是...纸条上的猎人组织？）' }
        ],
        choices: [
            { text: '去旧医院', next: 'go_hospital' },
            { text: '忽略短信', next: 'ignore_sms' }
        ]
    },
    'escape_office': {
        bg: 'bg-street',
        dialogues: [
            { speaker: '我', text: '（我冲出办公室，身后传来脚步声。）' },
            { speaker: '张明', text: '跑吧，但你逃不掉的。' },
            { speaker: '我', text: '（我跑进电梯，拼命按关门键...）' }
        ],
        choices: [
            { text: '去人多的商场', next: 'go_mall' },
            { text: '回家躲起来', next: 'hide_home' }
        ]
    },
    'go_with_them': {
        bg: 'bg-secret',
        dialogues: [
            { speaker: '我', text: '（我被带到一个地下室...这里到处都是培养舱。）' },
            { speaker: '张明', text: '欢迎参观伪人大本营。' },
            { speaker: '张明', text: '看到了吗？这些都是等待"同化"的人类。' },
            { speaker: '我', text: '（我浑身发冷...）' }
        ],
        choices: [
            { text: '假装配合，寻找机会', next: 'fake_cooperate' },
            { text: '质问他们目的', next: 'ask_purpose' }
        ]
    },
    'be_careful': {
        bg: 'bg-street',
        dialogues: [
            { speaker: '神秘人', text: '别紧张。我是猎人组织的。' },
            { speaker: '神秘人', text: '你发现了伪人的存在，所以他们要清除你。' },
            { speaker: '我', text: '猎人组织...纸条上提到的？' }
        ],
        choices: [
            { text: '相信他', next: 'trust_hunter' },
            { text: '怀疑是陷阱', next: 'suspect_trap' }
        ]
    },
    'ask_who': {
        bg: 'bg-street',
        dialogues: [
            { speaker: '神秘人', text: '我是猎人。专门猎杀伪人的组织。' },
            { speaker: '神秘人', text: '你已经被盯上了。想活命就跟我走。' }
        ],
        choices: [
            { text: '跟他走', next: 'trust_hunter' },
            { text: '拒绝', next: 'refuse_hunter' }
        ]
    },
    'go_hospital': {
        bg: 'bg-secret',
        dialogues: [
            { speaker: '我', text: '（我来到旧医院，这里一片漆黑。）' },
            { speaker: '我', text: '（地下有灯光...我顺着楼梯走下去。）' },
            { speaker: '神秘人', text: '你来了。比我想象的大胆。' }
        ],
        choices: [
            { text: '询问情况', next: 'ask_situation' },
            { text: '要求证明身份', next: 'ask_proof' }
        ]
    },
    'ignore_sms': {
        bg: 'bg-home',
        dialogues: [
            { speaker: '我', text: '（我拔掉手机卡，锁好门窗。）' },
            { speaker: '我', text: '（只要不出去，就应该安全...）' },
            { speaker: '敲门声', text: '林晓，开门。我是张明。' },
            { speaker: '我', text: '（他怎么找到这里的？！）' }
        ],
        choices: [
            { text: '不开门', next: 'dont_open' },
            { text: '开门对峙', next: 'open_door' }
        ]
    },
    'go_mall': {
        bg: 'bg-street',
        dialogues: [
            { speaker: '我', text: '（我躲进商场，混入人群。）' },
            { speaker: '我', text: '（伪人应该不敢在这么多人面前动手...）' },
            { speaker: '我', text: '（但我能躲多久？）' }
        ],
        choices: [
            { text: '联系猎人组织', next: 'contact_hunter' },
            { text: '想办法离开城市', next: 'leave_city' }
        ]
    },
    'hide_home': {
        bg: 'bg-home',
        dialogues: [
            { speaker: '我', text: '（我回到家，用家具堵住门。）' },
            { speaker: '我', text: '（但我知道这不够...）' },
            { speaker: '手机', text: '【未知号码】他们找到你了。快跑！' }
        ],
        choices: [
            { text: '从窗户逃跑', next: 'window_escape' },
            { text: '赌一把，相信短信', next: 'trust_sms' }
        ]
    },
    'fake_cooperate': {
        bg: 'bg-secret',
        dialogues: [
            { speaker: '张明', text: '聪明。反抗没有意义。' },
            { speaker: '张明', text: '（他带我走进一个房间，里面有奇怪的仪器。）' },
            { speaker: '张明', text: '躺上去。很快就不疼了。' }
        ],
        choices: [
            { text: '照做', next: 'ending_assimilate' },
            { text: '趁机破坏仪器', next: 'sabotage_device' }
        ]
    },
    'ask_purpose': {
        bg: 'bg-secret',
        dialogues: [
            { speaker: '张明', text: '目的？我们在进化人类。' },
            { speaker: '张明', text: '人类太脆弱了。疾病、衰老、死亡...我们解决了所有问题。' },
            { speaker: '我', text: '但你们失去了人性！' }
        ],
        choices: [
            { text: '试图说服他', next: 'try_persuade' },
            { text: '寻找武器', next: 'find_weapon' }
        ]
    },
    'trust_hunter': {
        bg: 'bg-secret',
        dialogues: [
            { speaker: '神秘人', text: '（他带我来到一个秘密基地。）' },
            { speaker: '神秘人', text: '这里是猎人的据点。伪人大本营在旧医院地下。' },
            { speaker: '神秘人', text: '我们今晚就行动。你愿意帮忙吗？' }
        ],
        choices: [
            { text: '加入行动', next: 'join_raid' },
            { text: '只想要保护', next: 'want_protection' }
        ]
    },
    'suspect_trap': {
        bg: 'bg-street',
        dialogues: [
            { speaker: '我', text: '我怎么知道你不是伪人？' },
            { speaker: '神秘人', text: '（他摘下帽子，露出一双布满血丝的眼睛。）' },
            { speaker: '神秘人', text: '伪人不会有失眠。我三天没睡了，一直在跟踪你保护你。' }
        ],
        choices: [
            { text: '相信他', next: 'trust_hunter' },
            { text: '还是怀疑', next: 'still_doubt' }
        ]
    },
    'refuse_hunter': {
        bg: 'bg-street',
        dialogues: [
            { speaker: '我', text: '我不想卷入这些。' },
            { speaker: '神秘人', text: '（他叹了口气）太晚了。你已经知道太多了。' },
            { speaker: '神秘人', text: '祝你好运。' }
        ],
        choices: [
            { text: '回家躲起来', next: 'hide_home' },
            { text: '报警', next: 'call_police' }
        ]
    },
    'ask_situation': {
        bg: 'bg-secret',
        dialogues: [
            { speaker: '神秘人', text: '伪人在进行大规模同化计划。' },
            { speaker: '神秘人', text: '他们要替换掉城市里 10% 的人类。' },
            { speaker: '我', text: '10%？！那岂不是...' }
        ],
        choices: [
            { text: '要求参与阻止', next: 'join_raid' },
            { text: '只想自保', next: 'want_protection' }
        ]
    },
    'ask_proof': {
        bg: 'bg-secret',
        dialogues: [
            { speaker: '神秘人', text: '（他递给我一个证件。）' },
            { speaker: '神秘人', text: '猎人组织，编号 734。你可以验证。' },
            { speaker: '我', text: '（证件上有防伪标记...看起来是真的。）' }
        ],
        choices: [
            { text: '相信他', next: 'trust_hunter' },
            { text: '还是不确定', next: 'still_doubt' }
        ]
    },
    'dont_open': {
        bg: 'bg-home',
        dialogues: [
            { speaker: '张明', text: '（门外安静了。）' },
            { speaker: '我', text: '（他走了？还是...）' },
            { speaker: '我', text: '（突然，窗户被打破了！）' }
        ],
        choices: [
            { text: '躲进衣柜', next: 'hide_closet' },
            { text: '从正门冲出去', next: 'rush_door' }
        ]
    },
    'open_door': {
        bg: 'bg-home',
        dialogues: [
            { speaker: '我', text: '（我打开门，但外面没人...）' },
            { speaker: '张明', text: '（从我身后）谢谢配合。' },
            { speaker: '我', text: '（他什么时候进来的？！）' }
        ],
        choices: [
            { text: '逃跑', next: 'escape_zhang' },
            { text: '对峙', next: 'confront_zhang' }
        ]
    },
    'contact_hunter': {
        bg: 'bg-street',
        dialogues: [
            { speaker: '我', text: '（我拨打了纸条上的号码。）' },
            { speaker: '电话', text: '【接通】你在哪？伪人在追踪这个号码。' },
            { speaker: '我', text: '我在中央商场！' }
        ],
        choices: [
            { text: '等他们来', next: 'wait_rescue' },
            { text: '自己想办法', next: 'self_rescue' }
        ]
    },
    'leave_city': {
        bg: 'bg-street',
        dialogues: [
            { speaker: '我', text: '（我买了最近一班离开城市的车票。）' },
            { speaker: '我', text: '（也许离开这里就安全了...）' },
            { speaker: '广播', text: '【通知】因技术原因，所有列车停运。' }
        ],
        choices: [
            { text: '尝试其他交通', next: 'other_transport' },
            { text: '放弃离开', next: 'give_up_leave' }
        ]
    },
    'window_escape': {
        bg: 'bg-street',
        dialogues: [
            { speaker: '我', text: '（我从防火梯爬下去...）' },
            { speaker: '我', text: '（落地时崴了脚，但我不能停。）' },
            { speaker: '神秘人', text: '上车！' }
        ],
        choices: [
            { text: '上车', next: 'trust_hunter' },
            { text: '犹豫', next: 'hesitate_car' }
        ]
    },
    'trust_sms': {
        bg: 'bg-home',
        dialogues: [
            { speaker: '我', text: '（我打开门，一辆车停在楼下。）' },
            { speaker: '神秘人', text: '快上来！他们马上就到！' }
        ],
        choices: [
            { text: '上车', next: 'trust_hunter' },
            { text: '再观察一下', next: 'observe_more' }
        ]
    },
    'ending_assimilate': {
        bg: 'bg-ending',
        dialogues: [
            { speaker: '我', text: '（我躺上仪器，意识逐渐模糊...）' },
            { speaker: '张明', text: '欢迎加入，新同伴。' },
            { speaker: '我', text: '（曾经的情感消失了...取而代之的是完美的冷静。）' }
        ],
        ending: true,

let currentScene = 'start';
let dialogueIndex = 0;
let isTyping = false;
let typingTimer = null;
let currentText = '';

function startGame() {
    document.getElementById('title-screen').style.display = 'none';
    document.getElementById('dialogue-box').style.display = 'block';
    loadScene('start');
}

function loadScene(sceneId) {
    const scene = scenes[sceneId];
    if (!scene) {
        console.error('Scene not found:', sceneId);
        return;
    }
    currentScene = sceneId;
    document.getElementById('background').className = scene.bg;
    dialogueIndex = 0;
    showDialogue();
}

function showDialogue() {
    const scene = scenes[currentScene];
    if (dialogueIndex >= scene.dialogues.length) {
        if (scene.ending) {
            showEnding(scene);
        } else if (scene.choices) {
            showChoices(scene.choices);
        }
        return;
    }
    const dialogue = scene.dialogues[dialogueIndex];
    document.getElementById('speaker-name').textContent = dialogue.speaker;
    currentText = dialogue.text;
    typeText(dialogue.text);
}

function typeText(text) {
    isTyping = true;
    let index = 0;
    const element = document.getElementById('dialogue-text');
    element.textContent = '';
    typingTimer = setInterval(() => {
        if (index < text.length) {
            element.textContent += text[index];
            index++;
        } else {
            clearInterval(typingTimer);
            isTyping = false;
        }
    }, 30);
}

function nextDialogue() {
    if (isTyping) {
        clearInterval(typingTimer);
        document.getElementById('dialogue-text').textContent = currentText;
        isTyping = false;
        return;
    }
    dialogueIndex++;
    showDialogue();
}

function showChoices(choices) {
    document.getElementById('dialogue-box').style.display = 'none';
    const container = document.getElementById('choices-container');
    container.innerHTML = '';
    container.style.display = 'flex';
    choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = choice.text;
        btn.onclick = () => {
            container.style.display = 'none';
            document.getElementById('dialogue-box').style.display = 'block';
            loadScene(choice.next);
        };
        container.appendChild(btn);
    });
}

function showEnding(scene) {
    document.getElementById('dialogue-box').style.display = 'none';
    document.getElementById('choices-container').style.display = 'none';
    const endingScreen = document.getElementById('ending-screen');
    document.getElementById('ending-title').textContent = scene.endingTitle;
    document.getElementById('ending-title').className = 'ending-' + scene.endingType;
    document.getElementById('ending-content').textContent = scene.endingText;
    endingScreen.style.display = 'flex';
}

function showTitle() {
    document.getElementById('ending-screen').style.display = 'none';
    document.getElementById('dialogue-box').style.display = 'none';
    document.getElementById('choices-container').style.display = 'none';
    document.getElementById('title-screen').style.display = 'flex';
}

function saveGame(slot) {
    const data = { scene: currentScene, dialogue: dialogueIndex, time: new Date().toLocaleString() };
    localStorage.setItem('pseudoSave' + slot, JSON.stringify(data));
    renderSaveSlots();
}

function loadGame(slot) {
    const data = localStorage.getItem('pseudoSave' + slot);
    if (data) {
        const parsed = JSON.parse(data);
        document.getElementById('title-screen').style.display = 'none';
        document.getElementById('dialogue-box').style.display = 'block';
        loadScene(parsed.scene);
        dialogueIndex = parsed.dialogue;
    }
}

function showSavePanel() {
    document.getElementById('panel-title').textContent = '存档';
    document.getElementById('save-load-panel').style.display = 'block';
    renderSaveSlots(true);
}

function showLoadPanel() {
    document.getElementById('panel-title').textContent = '读档';
    document.getElementById('save-load-panel').style.display = 'block';
    renderSaveSlots(false);
}

function hidePanel() {
    document.getElementById('save-load-panel').style.display = 'none';
}

function renderSaveSlots(isSave) {
    const container = document.getElementById('save-slots');
    container.innerHTML = '';
    for (let i = 1; i <= 6; i++) {
        const data = localStorage.getItem('pseudoSave' + i);
        const slot = document.createElement('div');
        slot.className = 'save-slot';
        if (data) {
            const parsed = JSON.parse(data);
            slot.innerHTML = '<div class="slot-number">存档 ' + i + '</div><div class="slot-info">' + parsed.scene + '</div><div class="slot-time">' + parsed.time + '</div>';
        } else {
            slot.innerHTML = '<div class="slot-number">存档 ' + i + '</div><div class="slot-info">空</div>';
        }
        slot.onclick = () => {
            if (isSave) saveGame(i);
            else loadGame(i);
            hidePanel();
        };
        container.appendChild(slot);
    }
}

document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'Enter') {
        if (document.getElementById('dialogue-box').style.display === 'block') {
            nextDialogue();
        }
    }
});
