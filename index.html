<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>伪人大本营 - 互动视觉小说</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #1a1a2e; color: #eee; overflow: hidden; height: 100vh; }
        #game-container { width: 100%; height: 100%; max-width: 1280px; max-height: 720px; margin: 0 auto; position: relative; }
        #background { position: absolute; width: 100%; height: 100%; transition: background 0.5s; }
        .bg-office { background: linear-gradient(180deg, #2d3436 0%, #1a1a2e 100%); }
        .bg-street { background: linear-gradient(180deg, #0c0c0c 0%, #1a1a2e 100%); }
        .bg-home { background: linear-gradient(180deg, #2d3436 0%, #0c0c0c 100%); }
        .bg-hospital { background: linear-gradient(180deg, #3a3a5c 0%, #1a1a2e 100%); }
        .bg-secret { background: linear-gradient(180deg, #4a0000 0%, #1a0000 100%); }
        .bg-ending { background: #000; }
        #dialogue-box { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 1000px; background: rgba(20,20,40,0.95); border: 2px solid #4a4a6a; border-radius: 15px; padding: 20px 30px; z-index: 10; }
        #speaker-name { font-size: 20px; font-weight: bold; color: #7a7aaa; margin-bottom: 10px; }
        #dialogue-text { font-size: 18px; line-height: 1.8; color: #fff; min-height: 60px; }
        #choices-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 20; display: none; flex-direction: column; gap: 15px; width: 80%; max-width: 600px; }
        .choice-btn { background: linear-gradient(180deg, #3a3a5a 0%, #2a2a4a 100%); border: 2px solid #5a5a7a; border-radius: 10px; padding: 20px; color: #fff; font-size: 18px; cursor: pointer; text-align: center; }
        .choice-btn:hover { background: linear-gradient(180deg, #4a4a6a 0%, #3a3a5a 100%); border-color: #7a7aaa; }
        #menu-buttons { position: absolute; top: 20px; right: 20px; z-index: 30; display: flex; gap: 10px; }
        .menu-btn { background: rgba(30,30,50,0.8); border: 1px solid #5a5a7a; border-radius: 5px; padding: 8px 15px; color: #aaa; cursor: pointer; }
        .menu-btn:hover { background: rgba(50,50,80,0.9); color: #fff; }

        #title-screen { position: absolute; width: 100%; height: 100%; pointer-events: auto; background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0a0a1a 100%); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #title-screen h1 { font-size: 48px; color: #7a7aaa; margin-bottom: 20px; }
        #title-screen .subtitle { font-size: 18px; color: #5a5a7a; margin-bottom: 20px; }
        #name-input-container { display: none; flex-direction: column; align-items: center; margin-bottom: 20px; }
        #player-name-input { background: rgba(30,30,50,0.8); border: 2px solid #5a5a7a; border-radius: 8px; padding: 12px 20px; color: #fff; font-size: 16px; width: 250px; text-align: center; margin-bottom: 15px; }
        #player-name-input:focus { outline: none; border-color: #7a7aaa; }
        .name-hint { font-size: 12px; color: #5a5a7a; margin-top: 10px; }
        .title-btn { background: #3a3a5a; cursor: pointer; pointer-events: auto; border: 2px solid #5a5a7a; border-radius: 10px; padding: 15px 50px; color: #fff; font-size: 18px; cursor: pointer; margin: 10px; }
        .title-btn:hover { background: #4a4a6a; border-color: #7a7aaa; }
        #ending-screen { position: absolute; width: 100%; height: 100%; background: #000; z-index: 50; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        #ending-screen h2 { font-size: 36px; color: #7a7aaa; margin-bottom: 20px; text-align: center; }
        #ending-screen .ending-text { font-size: 18px; line-height: 2; color: #aaa; max-width: 700px; text-align: center; }
        .ending-bad { color: #ff6b6b; }
        .ending-normal { color: #4ecdc4; }
        .ending-true { color: #ffe66d; }
        #continue-indicator { position: absolute; bottom: 15px; right: 30px; font-size: 24px; color: #7a7aaa; animation: blink 1s infinite; }
        @keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0.3; } }
        .rules-box { background: rgba(60,40,40,0.9); border: 2px solid #8b0000; padding: 15px; margin: 10px 0; border-radius: 8px; }
        .rules-box h3 { color: #ff6b6b; margin-bottom: 10px; }
        .rules-box ul { color: #aaa; padding-left: 20px; }
        .rules-box li { margin: 5px 0; }
        /* 章节标题 */
        .chapter-title { 
            font-size: 24px; 
            color: #4ecdc4; 
            text-align: center; 
            margin: 20px 0; 
            padding: 15px;
            background: linear-gradient(90deg, transparent, rgba(78,205,196,0.1), transparent);
            border-left: 3px solid #4ecdc4;
            border-right: 3px solid #4ecdc4;
        }
        /* 内心独白 */
        .inner-thought { 
            color: #9a9aaa; 
            font-style: italic; 
            border-left: 2px solid #5a5a7a;
            padding-left: 15px;
            margin: 10px 0;
        }
        /* 重要信息 */
        .important-text { 
            color: #ff6b6b; 
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255,107,107,0.5);
        }
        /* 神秘对话 */
        .mystery-text { 
            color: #a855f7;
            text-shadow: 0 0 5px rgba(168,85,247,0.3);
        }
        /* 伪人对话 */
        .pseudo-text { 
            color: #7a7aaa;
            letter-spacing: 2px;
        }
        /* 时间地点标签 */
        .location-tag {
            font-size: 12px;
            color: #5a5a7a;
            background: rgba(90,90,114,0.2);
            padding: 5px 10px;
            border-radius: 5px;
            display: inline-block;
            margin-bottom: 10px;
        }
        /* 心跳效果 */
        .heartbeat { 
            animation: heartbeat 1.5s infinite; 
        }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            10% { transform: scale(1.02); }
            20% { transform: scale(1); }
            30% { transform: scale(1.02); }
            40% { transform: scale(1); }
        }
        /* 模糊效果 */
        .blur-text {
            filter: blur(3px);
            transition: filter 0.5s;
        }
        .blur-text:hover {
            filter: blur(0);
        }
        /* 打字机效果容器 */
        .typewriter {
            overflow: hidden;
            border-right: 2px solid #7a7aaa;
            white-space: nowrap;
            animation: typing 3s steps(30, end);
        }
        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        /* 视觉增强 */
        .glitch-text { animation: glitch 0.3s infinite; display: inline-block; }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        .pulse-text { animation: pulse 2s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .danger-zone { background: rgba(139, 0, 0, 0.3); animation: dangerPulse 3s infinite; }
        @keyframes dangerPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(139, 0, 0, 0.5); }
            50% { box-shadow: 0 0 40px rgba(139, 0, 0, 0.8); }
        }
        .safe-zone { background: rgba(78, 205, 196, 0.2); }
        .typing-cursor::after { content: '▋'; animation: blink 0.7s infinite; color: #7a7aaa; }
        .scene-transition { animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 手机界面 */
        #phone-ui { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 320px; height: 600px; background: #1a1a2e; border: 3px solid #4a4a6a; border-radius: 20px; z-index: 50; overflow: hidden; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        #phone-screen { width: 100%; height: 100%; background: #0a0a1a; padding: 10px; overflow-y: auto; }
        .phone-header { background: #2a2a4a; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        .phone-signal { font-size: 12px; color: #7a7aaa; }
        .phone-app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 10px; }
        .phone-app { background: #3a3a5a; border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; font-size: 24px; }
        .phone-app:hover { background: #4a4a6a; }
        .phone-app-label { font-size: 10px; color: #aaa; margin-top: 5px; }
        .phone-msg-list { padding: 10px; }
        .phone-msg { background: #2a2a4a; border-radius: 8px; padding: 10px; margin-bottom: 8px; font-size: 12px; }
        .phone-msg.unread { border-left: 3px solid #4ecdc4; }
        .phone-btn { background: #4a4a6a; border: none; border-radius: 8px; padding: 10px; color: #fff; width: 100%; margin-top: 10px; cursor: pointer; }
        .phone-inventory { padding: 10px; }
        .phone-item { background: #2a2a4a; border-radius: 8px; padding: 10px; margin-bottom: 8px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
        .phone-item .item-name { color: #fff; }
        .phone-item .item-desc { color: #7a7aaa; font-size: 11px; }
        .phone-close { position: absolute; top: 10px; right: 10px; background: #5a3a3a; border: none; color: #fff; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 16px; }
        .phone-tab-bar { position: absolute; bottom: 0; width: 100%; height: 50px; background: #2a2a4a; display: flex; justify-content: space-around; align-items: center; }
        .phone-tab { color: #7a7aaa; font-size: 20px; cursor: pointer; padding: 5px; }
        .phone-tab.active { color: #4ecdc4; }

    </style>
</head>
<body>
<div id="game-container">
    <div id="background" class="bg-office"></div>
    <div id="menu-buttons">
        <button class="menu-btn" onclick="showTitle()">🏠 标题</button>
    </div>
    
    <div id="title-screen">
        <h1>🎭 伪人大本营</h1>
        <p class="subtitle">你能识破伪装者吗？</p>
        
        <!-- 车卡界面 -->
        <div id="character-creation" style="display:none; flex-direction:column; align-items:center; width:90%; max-width:600px; background:rgba(20,20,40,0.95); padding:20px; border-radius:15px; margin:20px;">
            <h2 style="color:#7a7aaa; margin-bottom:15px;">📋 角色创建</h2>
            
            <div id="stats-allocation" style="width:100%;">
                <p style="color:#aaa; margin-bottom:10px;">分配属性点（剩余：<span id="stat-points-left" style="color:#4ecdc4;">250</span>）</p>
                <div id="stats-slots"></div>
            </div>
            
            <div id="background-select" style="width:100%; margin-top:15px;">
                <p style="color:#aaa; margin-bottom:10px;">选择背景身份</p>
                <select id="background-select" style="width:100%; padding:10px; background:#2a2a4a; border:1px solid #5a5a7a; color:#fff; border-radius:5px;"></select>
            </div>
            
            <div id="traits-select" style="width:100%; margin-top:15px;">
                <p style="color:#aaa; margin-bottom:10px;">选择特质</p>
                <div id="positive-traits"></div>
                <div id="negative-traits"></div>
            </div>
            
            <div id="skills-allocation" style="width:100%; margin-top:15px;">
                <p style="color:#aaa; margin-bottom:10px;">分配技能点（剩余：<span id="skill-points-left" style="color:#4ecdc4;">30</span>）</p>
                <div id="skills-slots"></div>
            </div>
            
            <div id="character-preview" style="width:100%; margin-top:15px; padding:15px; background:#1a1a2e; border-radius:8px; display:none;">
                <h3 style="color:#4ecdc4;">角色预览</h3>
                <div id="preview-content"></div>
            </div>
            
            <div style="margin-top:20px; display:flex; gap:10px; justify-content:center;">
                <button class="title-btn" onclick="confirmCharacter()">✅ 确认创建</button>
                <button class="title-btn" onclick="rerollCharacter()">🎲 重新生成</button>
            </div>
        </div>
        <div id="name-input-container">
            <input type="text" id="player-name-input" placeholder="输入你的名字" maxlength="10">
            <button class="title-btn" onclick="confirmName()">✅ 确认</button>
            <p class="name-hint">💡 输入特定角色名有彩蛋哦~</p>
        </div>
        <button class="title-btn" id="start-btn" onclick="showNameInput(); return false;">▶️ 开始游戏</button>
    </div>
    <div id="ending-screen">
        <h2 id="ending-title"></h2>
        <p class="ending-text" id="ending-content"></p>
        <button class="title-btn" onclick="showTitle()">🔄 重新开始</button>
    </div>
    <div id="dialogue-box" style="display: none;" onclick="nextDialogue()">
        <div id="speaker-name"></div>
        <div id="dialogue-text"></div>
        <div id="continue-indicator">▼</div>
    </div>
    <div id="choices-container"></div>

<!-- 检定 UI -->
<div id="check-ui" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:100; text-align:center;">
    <div style="background:rgba(20,20,40,0.98); border:3px solid #4ecdc4; border-radius:20px; padding:30px; min-width:400px; box-shadow:0 0 50px rgba(78,205,196,0.5);">
        <h2 style="color:#4ecdc4; margin-bottom:20px; font-size:28px;">🎲 检定</h2>
        <div id="check-description" style="color:#aaa; margin-bottom:20px; font-size:16px;"></div>
        <div style="display:flex; justify-content:space-around; margin-bottom:20px;">
            <div style="text-align:center;">
                <div style="color:#7a7aaa; font-size:14px;">属性</div>
                <div id="check-attr" style="color:#fff; font-size:24px; font-weight:bold;">--</div>
            </div>
            <div style="text-align:center;">
                <div style="color:#7a7aaa; font-size:14px;">技能</div>
                <div id="check-skill" style="color:#fff; font-size:24px; font-weight:bold;">--</div>
            </div>
            <div style="text-align:center;">
                <div style="color:#7a7aaa; font-size:14px;">DC</div>
                <div id="check-dc" style="color:#ff6b6b; font-size:24px; font-weight:bold;">--</div>
            </div>
        </div>
        <div id="check-result" style="font-size:48px; font-weight:bold; margin-bottom:20px; text-shadow:0 0 20px currentColor;"></div>
        <div style="display:flex; justify-content:space-around; color:#aaa;">
            <div>骰子：<span id="check-roll" style="color:#fff;">--</span>/100</div>
            <div>目标：<span id="check-target" style="color:#fff;">--</span></div>
        </div>
    </div>
</div>
    
    <div id="phone-ui">
        <button class="phone-close" onclick="closePhone()">×</button>
        <div id="phone-screen">
            <div class="phone-header">

            <div id="phone-content">

                    <div class="phone-app" onclick="showPhoneTab('map')">🗺️<div class="phone-app-label">地图</div></div>
                </div>
            </div>
        </div>
    </div>
</div>

// 道具系统
let inventory = [];
let phoneUnread = 0;

// 初始道具
const startingItems = [
    { id: 'note', name: '📜 生存指南', desc: '伪人识别方法和生存规则' },
    { id: 'phone', name: '📱 手机', desc: '可以联系猎人和查看消息' }
];

function initInventory() {
    inventory = [...startingItems];
}

function addItem(item) {
    if (!inventory.find(i => i.id === item.id)) {
        inventory.push(item);
        phoneUnread++;
        updatePhoneTime();
    }
}

function initCharacterCreation() {

function renderStats() {
    const container = document.getElementById('stats-slots');
    const stats = ['SAN', 'INS', 'DIS', 'LUK', 'SUR'];
    const labels = { SAN: '理智', INS: '洞察', DIS: '伪装', LUK: '幸运', SUR: '生存' };
    
    container.innerHTML = stats.map(stat => `
        <div style="display:flex; justify-content:space-between; align-items:center; margin:8px 0;">
            <span style="color:#aaa; width:80px;">${labels[stat]}</span>
            <button onclick="adjustStat('${stat}', -5)" style="width:30px; height:30px; background:#3a3a5a; border:none; color:#fff; border-radius:5px; cursor:pointer;">-</button>
            <span id="stat-${stat}" style="color:#4ecdc4; width:40px; text-align:center;">${playerStats[stat]}</span>
            <button onclick="adjustStat('${stat}', 5)" style="width:30px; height:30px; background:#3a3a5a; border:none; color:#fff; border-radius:5px; cursor:pointer;">+</button>
        </div>
    `).join('');
    
    document.getElementById('stat-points-left').textContent = statPointsLeft;
}

function adjustStat(stat, delta) {
    const newVal = playerStats[stat] + delta;
    if (newVal < 20 || newVal > 60) return;
    
    const newTotal = Object.values(playerStats).reduce((a, b) => a + b, 0) + delta - playerStats[stat];
    if (newTotal > STAT_POINTS) return;
    
    playerStats[stat] = newVal;
    statPointsLeft = STAT_POINTS - newTotal;
    document.getElementById(`stat-${stat}`).textContent = newVal;
    document.getElementById('stat-points-left').textContent = statPointsLeft;
}

function updateBackground(index) {
    playerBackground = BACKGROUNDS[index];
    // 应用加成
    Object.entries(playerBackground.bonus).forEach(([stat, val]) => {
        playerStats[stat] = Math.max(20, Math.min(60, playerStats[stat] + val));
    });
    renderStats();
}

function renderTraits() {
    const posContainer = document.getElementById('positive-traits');
    const negContainer = document.getElementById('negative-traits');
    
    posContainer.innerHTML = POSITIVE_TRAITS.map(t => `
        <label style="display:block; color:#aaa; margin:5px 0;">
            <input type="checkbox" onchange="toggleTrait('pos', '${t.name}')"> ${t.name} (${t.effect})
        </label>
    `).join('');
    
    negContainer.innerHTML = NEGATIVE_TRAITS.map(t => `
        <label style="display:block; color:#aaa; margin:5px 0;">
            <input type="checkbox" onchange="toggleTrait('neg', '${t.name}')"> ${t.name} (${t.effect}) [+${t.points}点]
        </label>
    `).join('');
}

function toggleTrait(type, name) {
    if (type === 'pos') {
        const idx = playerPositiveTraits.indexOf(name);
        if (idx >= 0) playerPositiveTraits.splice(idx, 1);
        else if (playerPositiveTraits.length < 2) playerPositiveTraits.push(name);
    } else {
        const idx = playerNegativeTraits.indexOf(name);
        if (idx >= 0) playerNegativeTraits.splice(idx, 1);
        else if (playerNegativeTraits.length < 2) playerNegativeTraits.push(name);
    }
}

// 检定系统
function rollCheck(attribute, skill, dc, description) {
    const roll = Math.floor(Math.random() * 100) + 1;
    const targetValue = playerCharacter.stats[attribute] + playerCharacter.skills[skill];
    const effectiveDC = dc;
    
    let result;
    if (roll <= 5) {
        result = '大成功';
    } else if (roll >= 96) {
        result = '大失败';
    } else if (roll <= targetValue - effectiveDC + 50) {
        result = '成功';
    } else {
        result = '失败';
    }
    
    return {
        roll,
        targetValue,
        dc,
        result,
        description
    };
}

// 显示检定结果 UI
function showCheckResult(check) {
    const ui = document.getElementById('check-ui');

    document.getElementById('check-dc').textContent = 'DC' + check.dc;
    document.getElementById('check-roll').textContent = check.roll;
    document.getElementById('check-target').textContent = check.targetValue;
    
    const resultEl = document.getElementById('check-result');
    if (check.result === '大成功') {
        resultEl.textContent = '🎉 大成功！';
        resultEl.style.color = '#ffe66d';
    } else if (check.result === '成功') {
        resultEl.textContent = '✅ 成功';
        resultEl.style.color = '#4ecdc4';
    } else if (check.result === '失败') {
        resultEl.textContent = '❌ 失败';

    } else {
        resultEl.textContent = '💀 大失败！';

    }, 3000);
    
    return check.result;
}

// 核心游戏函数
let currentScene = 'start';
let dialogueIndex = 0;
let isTyping = false;
let typingTimer = null;
let currentText = '';

function loadScene(sceneId) {
    const scene = scenes[sceneId];
    if (!scene) {
        console.error('Scene not found:', sceneId);
        return;
    }
    
    currentScene = sceneId;
    dialogueIndex = 0;
    
    // 隐藏选项容器，等新对话播放完再显示
    document.getElementById('choices-container').style.display = 'none';
    
    // 设置背景
    const bg = document.getElementById('background');
    bg.className = 'bg-' + (scene.bg || 'office');
    
    // 检查是否是结局
    if (scene.ending) {
        showEnding(scene);
        return;
    }
    
    // 显示第一句对话
    showDialogue(scene.dialogues[0]);
    
    // 如果只有一句对话且有选项，直接显示
    if (scene.dialogues.length === 1 && scene.choices) {
        showChoices(scene.choices);
    }
}

function showDialogue(dialogue) {
    const speakerEl = document.getElementById('speaker-name');
    const textEl = document.getElementById('dialogue-text');
    
    // 显示说话者名字
    let speakerName = dialogue.speaker || '';
    speakerEl.textContent = speakerName;
    
    currentText = dialogue.text || '';
    
    // 替换占位符
    if (playerName) {
        currentText = currentText.replace(/\{\{PLAYER_NAME\}\}/g, playerName);
    }
    
    // 简单显示，不打字机效果
    textEl.innerHTML = currentText.replace(/\n/g, '<br>');
    
    document.getElementById('dialogue-box').style.display = 'block';
    document.getElementById('continue-indicator').style.display = 'block';
}

function showChoices(choices) {
    const container = document.getElementById('choices-container');
    container.innerHTML = '';
    
    choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = choice.text;
        btn.onclick = (e) => {
            e.stopPropagation();
            if (choice.next) {
                loadScene(choice.next);
            }
        };
        container.appendChild(btn);
    });
    
    container.style.display = 'flex';
}

function nextDialogue() {
    const scene = scenes[currentScene];
    if (!scene) return;
    
    const choicesContainer = document.getElementById('choices-container');
    
    // 如果选项已经显示，不要隐藏（让玩家点击）
    if (scene.choices && choicesContainer && choicesContainer.style.display === 'flex') {
        return;
    }
    
    dialogueIndex++;
    
    // 检查是否还有下一句对话
    if (dialogueIndex < scene.dialogues.length) {
        showDialogue(scene.dialogues[dialogueIndex]);
        
        // 如果是最后一句对话且有选项，显示选项
        if (scene.choices && dialogueIndex === scene.dialogues.length - 1) {
            showChoices(scene.choices);
            // start 场景获得纸条
            if (currentScene === 'start') {
                addItem({id:'note',name:'📜 生存指南',desc:'伪人识别方法和生存规则'});
            }
        }
    }
}

function showEnding(scene) {
    const endingScreen = document.getElementById('ending-screen');
    const endingTitle = document.getElementById('ending-title');
    const endingContent = document.getElementById('ending-content');
    
    let endingText = scene.endingText.replace(/你/g, playerName);
    let endingTitleText = scene.endingTitle.replace(/你/g, playerName);
    
    if (isEasterEgg) {
        endingTitleText = '🎉 ' + endingTitleText;
        endingText = '【彩蛋身份：' + easterEggRoles[easterEggRole] + '】\n\n' + endingText;
    }
    
    const typeIcons = { 'bad': '💀', 'normal': '🌅', 'true': '⭐' };
    const icon = typeIcons[scene.endingType] || '🎭';
    
    endingTitle.innerHTML = icon + ' ' + endingTitleText;
    endingTitle.className = 'ending-' + scene.endingType;
    endingContent.innerHTML = endingText.replace(/\n/g, '<br>');
    
    endingScreen.style.display = 'flex';
}

// 在菜单中添加手机按钮
function addPhoneButton() {
    const menuButtons = document.getElementById('menu-buttons');
    if (!document.getElementById('phone-btn')) {
        const phoneBtn = document.createElement('button');
        phoneBtn.id = 'phone-btn';
        phoneBtn.className = 'menu-btn';
        phoneBtn.textContent = '📱 手机';
        phoneBtn.onclick = (e) => { e.stopPropagation(); showPhone(); };
        menuButtons.insertBefore(phoneBtn, menuButtons.firstChild);
    }
}
