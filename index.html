<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>伪人大本营 - 互动视觉小说</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'SimHei', Arial, sans-serif;
            background: #1a1a2e;
            color: #eee;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #game-container {
            width: 100%;
            height: 100%;
            max-width: 1280px;
            max-height: 720px;
            margin: 0 auto;
            position: relative;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
        }

        /* 背景层 */
        #background {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: background 0.5s ease;
            z-index: 1;
        }

        .bg-office {
            background: linear-gradient(180deg, #2d3436 0%, #1a1a2e 100%);
        }

        .bg-street {
            background: linear-gradient(180deg, #0c0c0c 0%, #1a1a2e 100%);
        }

        .bg-home {
            background: linear-gradient(180deg, #2d3436 0%, #0c0c0c 100%);
        }

        .bg-hospital {
            background: linear-gradient(180deg, #3a3a5c 0%, #1a1a2e 100%);
        }

        .bg-secret {
            background: linear-gradient(180deg, #4a0000 0%, #1a0000 100%);
        }

        .bg-ending {
            background: linear-gradient(180deg, #000000 0%, #1a1a2e 100%);
        }

        /* 角色立绘层 */
        #characters {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .character {
            position: absolute;
            bottom: 20%;
            width: 200px;
            height: 400px;
            background: linear-gradient(180deg, #4a4a6a 0%, #2a2a4a 100%);
            border-radius: 10px 10px 0 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .character.left {
            left: 15%;
        }

        .character.center {
            left: 50%;
            transform: translateX(-50%);
            width: 250px;
            height: 450px;
        }

        .character.right {
            right: 15%;
        }

        .character .name {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .character .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #6a6a8a;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        /* 对话框 */
        #dialogue-box {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1000px;
            background: linear-gradient(180deg, rgba(20,20,40,0.95) 0%, rgba(10,10,30,0.98) 100%);
            border: 2px solid #4a4a6a;
            border-radius: 15px;
            padding: 20px 30px;
            z-index: 10;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        #speaker-name {
            font-size: 20px;
            font-weight: bold;
            color: #7a7aaa;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        #dialogue-text {
            font-size: 18px;
            line-height: 1.8;
            color: #fff;
            min-height: 80px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        #continue-indicator {
            position: absolute;
            bottom: 15px;
            right: 30px;
            font-size: 24px;
            color: #7a7aaa;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }

        /* 选项按钮 */
        #choices-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            display: none;
            flex-direction: column;
            gap: 15px;
            width: 80%;
            max-width: 600px;
        }

        .choice-btn {
            background: linear-gradient(180deg, #3a3a5a 0%, #2a2a4a 100%);
            border: 2px solid #5a5a7a;
            border-radius: 10px;
            padding: 20px 30px;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .choice-btn:hover {
            background: linear-gradient(180deg, #4a4a6a 0%, #3a3a5a 100%);
            border-color: #7a7aaa;
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(0,0,0,0.7);
        }

        .choice-btn:active {
            transform: scale(0.98);
        }

        /* 菜单按钮 */
        #menu-buttons {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 30;
            display: flex;
            gap: 10px;
        }

        .menu-btn {
            background: rgba(30,30,50,0.8);
            border: 1px solid #5a5a7a;
            border-radius: 5px;
            padding: 8px 15px;
            color: #aaa;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .menu-btn:hover {
            background: rgba(50,50,80,0.9);
            color: #fff;
            border-color: #7a7aaa;
        }

        /* 存档/读档面板 */
        #save-load-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(180deg, rgba(20,20,40,0.98) 0%, rgba(10,10,30,0.99) 100%);
            border: 2px solid #5a5a7a;
            border-radius: 15px;
            padding: 30px;
            z-index: 40;
            display: none;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        #save-load-panel h2 {
            color: #7a7aaa;
            margin-bottom: 20px;
            text-align: center;
            font-size: 24px;
        }

        .save-slots {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .save-slot {
            background: rgba(30,30,50,0.6);
            border: 1px solid #4a4a6a;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 100px;
        }

        .save-slot:hover {
            background: rgba(50,50,80,0.8);
            border-color: #6a6a8a;
        }

        .save-slot .slot-number {
            color: #7a7aaa;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .save-slot .slot-info {
            color: #aaa;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .save-slot .slot-time {
            color: #5a5a7a;
            font-size: 11px;
        }

        .panel-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }

        .panel-btn {
            background: linear-gradient(180deg, #3a3a5a 0%, #2a2a4a 100%);
            border: 1px solid #5a5a7a;
            border-radius: 8px;
            padding: 10px 25px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .panel-btn:hover {
            background: linear-gradient(180deg, #4a4a6a 0%, #3a3a5a 100%);
            border-color: #7a7aaa;
        }

        .panel-btn.close {
            background: linear-gradient(180deg, #5a3a3a 0%, #4a2a2a 100%);
        }

        .panel-btn.close:hover {
            background: linear-gradient(180deg, #6a4a4a 0%, #5a3a3a 100%);
        }

        /* 标题画面 */
        #title-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0a0a1a 100%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #title-screen h1 {
            font-size: 64px;
            color: #7a7aaa;
            text-shadow: 0 0 30px rgba(122,122,170,0.5);
            margin-bottom: 20px;
            letter-spacing: 10px;
        }

        #title-screen .subtitle {
            font-size: 24px;
            color: #5a5a7a;
            margin-bottom: 50px;
            letter-spacing: 5px;
        }

        .title-btn {
            background: linear-gradient(180deg, #3a3a5a 0%, #2a2a4a 100%);
            border: 2px solid #5a5a7a;
            border-radius: 10px;
            padding: 15px 50px;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
            min-width: 200px;
        }

        .title-btn:hover {
            background: linear-gradient(180deg, #4a4a6a 0%, #3a3a5a 100%);
            border-color: #7a7aaa;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(122,122,170,0.3);
        }

        /* 结局画面 */
        #ending-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 50;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        #ending-screen h2 {
            font-size: 48px;
            color: #7a7aaa;
            margin-bottom: 30px;
            text-align: center;
        }

        #ending-screen .ending-text {
            font-size: 20px;
            line-height: 2;
            color: #aaa;
            max-width: 800px;
            text-align: center;
            margin-bottom: 40px;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            #game-container {
                max-height: 100vh;
            }

            #title-screen h1 {
                font-size: 36px;
                letter-spacing: 5px;
            }

            #title-screen .subtitle {
                font-size: 16px;
            }

            .title-btn {
                padding: 12px 30px;
                font-size: 16px;
                min-width: 150px;
            }

            .character {
                width: 120px;
                height: 250px;
            }

            .character.center {
                width: 150px;
                height: 300px;
            }

            #dialogue-box {
                width: 95%;
                padding: 15px 20px;
                bottom: 10px;
            }

            #speaker-name {
                font-size: 16px;
            }

            #dialogue-text {
                font-size: 15px;
                min-height: 60px;
            }

            .choice-btn {
                padding: 15px 20px;
                font-size: 16px;
            }

            #save-load-panel {
                padding: 20px;
            }

            .save-slots {
                grid-template-columns: 1fr;
            }
        }

        /* 特效 */
        .fade-in {
            animation: fadeIn 0.5s ease;
        }

        .fade-out {
            animation: fadeOut 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        .shake {
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* 隐藏元素 */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- 标题画面 -->
        <div id="title-screen">
            <h1>伪人大本营</h1>
            <div class="subtitle">他们就在你身边...</div>
            <button class="title-btn" onclick="game.start()">开始游戏</button>
            <button class="title-btn" onclick="game.showLoadPanel()">读取存档</button>
            <button class="title-btn" onclick="game.showCredits()">制作信息</button>
        </div>

        <!-- 游戏主界面 -->
        <div id="background" class="bg-office"></div>
        
        <div id="characters"></div>
        
        <div id="dialogue-box" class="hidden">
            <div id="speaker-name"></div>
            <div id="dialogue-text"></div>
            <div id="continue-indicator">▼</div>
        </div>

        <div id="choices-container"></div>

        <div id="menu-buttons" class="hidden">
            <button class="menu-btn" onclick="game.showSavePanel()">存档</button>
            <button class="menu-btn" onclick="game.showLoadPanel()">读档</button>
            <button class="menu-btn" onclick="game.toTitle()">标题</button>
        </div>

        <!-- 存档/读档面板 -->
        <div id="save-load-panel">
            <h2 id="panel-title">存档</h2>
            <div class="save-slots" id="save-slots"></div>
            <div class="panel-buttons">
                <button class="panel-btn close" onclick="game.closePanel()">关闭</button>
            </div>
        </div>

        <!-- 结局画面 -->
        <div id="ending-screen">
            <h2 id="ending-title"></h2>
            <div class="ending-text" id="ending-text"></div>
            <button class="title-btn" onclick="game.toTitle()">返回标题</button>
        </div>
    </div>

    <script>
        // 游戏数据
        const gameData = {
            currentScene: 'start',
            dialogueIndex: 0,
            flags: {},
            inventory: [],
            saveSlots: 5
        };

        // 场景数据
        const scenes = {
            'start': {
                bg: 'bg-office',
                dialogues: [
                    { speaker: '？？？', text: '你...能听见我说话吗？' },
                    { speaker: '？？？', text: '太好了...看来信号还能传过来。' },
                    { speaker: '我', text: '谁？谁在说话？' },
                    { speaker: '神秘人', text: '没时间解释了。听着，你周围有人不是人类。' },
                    { speaker: '我', text: '什么？你在开玩笑吗？' },
                    { speaker: '神秘人', text: '我希望是玩笑。但他们伪装得太完美了，连我都差点没发现。' },
                    { speaker: '神秘人', text: '记住：观察他们的眼睛。伪人的眼睛...会在特定光线下反射异常的光芒。' },
                    { speaker: '神秘人', text: '我先挂了，有人来了。保护好自己。' }
                ],
                choices: [
                    { text: '认为这是恶作剧，继续正常工作', next: 'office_normal' },
                    { text: '开始警惕，观察周围的人', next: 'office_alert' }
                ]
            },
            'office_normal': {
                bg: 'bg-office',
                dialogues: [
                    { speaker: '我', text: '真是的，现在的骚扰电话越来越离谱了。' },
                    { speaker: '张明', text: '林晓，发什么呆呢？开会了！' },
                    { speaker: '我', text: '啊，来了！' },
                    { speaker: '我', text: '（张明是我的同事，平时人挺好的...应该不会有什么问题吧？）' }
                ],
                choices: [
                    { text: '信任张明，和他一起开会', next: 'meeting_zhang' },
                    { text: '找借口避开，独自调查', next: 'investigate_alone' }
                ]
            },
            'office_alert': {
                bg: 'bg-office',
                dialogues: [
                    { speaker: '我', text: '伪人...真的存在吗？' },
                    { speaker: '李雨', text: '林晓，你怎么脸色这么差？不舒服吗？' },
                    { speaker: '我', text: '（李雨是我的邻居，总是很关心我...）' },
                    { speaker: '我', text: '没事，可能昨晚没睡好。' },
                    { speaker: '李雨', text: '那要不要去王医生那里看看？他就在社区诊所。' }
                ],
                choices: [
                    { text: '接受建议，去找王医生', next: 'hospital_wang' },
                    { text: '拒绝，继续观察李雨', next: 'observe_li' }
                ]
            },
            'meeting_zhang': {
                bg: 'bg-office',
                dialogues: [
                    { speaker: '张明', text: '好了，今天的会议就到这里。大家回去工作吧。' },
                    { speaker: '我', text: '（会议进行中，我注意到张明的行为有些奇怪...）' },
                    { speaker: '我', text: '（他眨眼的频率太规律了，就像...设定好的程序？）' },
                    { speaker: '张明', text: '林晓，你留下来一下。' }
                ],
                choices: [
                    { text: '留下', next: 'zhang_confront' },
                    { text: '找借口离开', next: 'escape_meeting' }
                ]
            },
            'investigate_alone': {
                bg: 'bg-street',
                dialogues: [
                    { speaker: '我', text: '我得找个安静的地方想想。' },
                    { speaker: '我', text: '（走在街上，我仔细观察着每一个路人...）' },
                    { speaker: '我', text: '等等，那个人...他的眼睛...' },
                    { speaker: '神秘人', text: '别盯着看！会被发现的！' }
                ],
                choices: [
                    { text: '立刻移开视线', next: 'street_avoid' },
                    { text: '继续观察，收集更多信息', next: 'street_observe' }
                ]
            },
            'hospital_wang': {
                bg: 'bg-hospital',
                dialogues: [
                    { speaker: '王医生', text: '请坐，林小姐。李雨说你不太舒服？' },
                    { speaker: '我', text: '（王医生看起来很和蔼，但...）' },
                    { speaker: '我', text: '（他的诊室里有很多奇怪的文件，上面画着...人体结构图？）' },
                    { speaker: '王医生', text: '来，让我看看你的眼睛。' }
                ],
                choices: [
                    { text: '配合检查', next: 'wang_exam' },
                    { text: '拒绝，找借口离开', next: 'wang_escape' }
                ]
            },
            'observe_li': {
                bg: 'bg-home',
                dialogues: [
                    { speaker: '我', text: '（回到家，我从窗户观察着李雨的家...）' },
                    { speaker: '我', text: '（她在做什么？那些奇怪的仪器是什么？）' },
                    { speaker: '李雨', text: '林晓？你在看什么？' },
                    { speaker: '我', text: '（她什么时候发现的？！）' }
                ],
                choices: [
                    { text: '坦白询问', next: 'li_confront' },
                    { text: '假装没事', next: 'li_pretend' }
                ]
            },
            'zhang_confront': {
                bg: 'bg-office',
                dialogues: [
                    { speaker: '张明', text: '你知道吗，林晓。你最近...很爱观察人。' },
                    { speaker: '我', text: '（他的声音...为什么变得这么冰冷？）' },
                    { speaker: '张明', text: '我们注意到了。但你不用担心。' },
                    { speaker: '张明', text: '很快，你也会和我们一样。' }
                ],
                choices: [
                    { text: '逃跑', next: 'escape_zhang' },
                    { text: '质问他在说什么', next: 'zhang_truth' }
                ]
            },
            'escape_meeting': {
                bg: 'bg-street',
                dialogues: [
                    { speaker: '我', text: '（我找了个借口离开了公司...）' },
                    { speaker: '我', text: '张明最后那个眼神...绝对有问题。' },
                    { speaker: '神秘人', text: '你做得对。他是伪人。' },
                    { speaker: '我', text: '你？！你怎么又出现了？' },
                    { speaker: '神秘人', text: '没时间解释了。伪人大本营就在城市地下。你必须找到入口。' }
                ],
                choices: [
                    { text: '询问入口位置', next: 'secret_entrance' },
                    { text: '质疑神秘人的身份', next: 'mystery_identity' }
                ]
            },
            'street_avoid': {
                bg: 'bg-street',
                dialogues: [
                    { speaker: '我', text: '（我立刻移开视线，装作什么都没看见...）' },
                    { speaker: '我', text: '（但那个人朝我走过来了...）' },
                    { speaker: '？？？', text: '你看到了，对吧？' }
                ],
                choices: [
                    { text: '否认', next: 'street_deny' },
                    { text: '承认并询问', next: 'street_ask' }
                ]
            },
            'street_observe': {
                bg: 'bg-street',
                dialogues: [
                    { speaker: '我', text: '（我继续观察，发现那个人的眼睛在路灯下确实有异常反光...）' },
                    { speaker: '我', text: '（突然，他转头看向了我...）' },
                    { speaker: '？？？', text: '你在看什么？' },
                    { speaker: '我', text: '（他的表情...完全不像人类...）' }
                ],
                choices: [
                    { text: '逃跑', next: 'street_run' },
                    { text: '尝试交流', next: 'street_talk' }
                ]
            },
            'wang_exam': {
                bg: 'bg-hospital',
                dialogues: [
                    { speaker: '王医生', text: '放松...很快就好了。' },
                    { speaker: '我', text: '（他拿出一个奇怪的仪器，靠近我的眼睛...）' },
                    { speaker: '王医生', text: '嗯...果然。你有成为我们的潜质。' },
                    { speaker: '我', text: '什么？！' }
                ],
                choices: [
                    { text: '反抗', next: 'wang_fight' },
                    { text: '假装配合，寻找机会', next: 'wang_fake' }
                ]
            },
            'wang_escape': {
                bg: 'bg-street',

                endingText: '为了摧毁伪人大本营，你选择了自我牺牲。爆炸吞噬了一切，包括你。但你的牺牲没有白费——伪人的计划被彻底破坏，无数人因此得救。你成为了英雄，虽然没有人知道你的名字。'

        // 游戏引擎
        const game = {
            currentScene: null,
            dialogueIndex: 0,
            flags: {},
            inventory: [],
            isTyping: false,
            typingTimeout: null,

            // 初始化
            init() {
                this.loadProgress();
                this.setupEventListeners();
            },

            // 设置事件监听
            setupEventListeners() {
                document.getElementById('dialogue-box').addEventListener('click', () => {
                    if (!this.currentScene || document.getElementById('choices-container').style.display === 'flex') {
                        return;
                    }
                    this.nextDialogue();
                });

                document.addEventListener('keydown', (e) => {
                    if (e.code === 'Space' || e.code === 'Enter') {
                        if (!this.currentScene || document.getElementById('choices-container').style.display === 'flex') {
                            return;
                        }
                        e.preventDefault();
                        this.nextDialogue();
                    }
                });
            },

            // 开始游戏
            start() {
                document.getElementById('title-screen').classList.add('hidden');
                document.getElementById('menu-buttons').classList.remove('hidden');
                document.getElementById('dialogue-box').classList.remove('hidden');
                this.loadScene('start');
            },

            // 加载场景
            loadScene(sceneId) {
                const scene = scenes[sceneId];
                if (!scene) {
                    console.error('Scene not found:', sceneId);
                    return;
                }

                this.currentScene = scene;
                this.dialogueIndex = 0;

                // 设置背景
                const bg = document.getElementById('background');
                bg.className = scene.bg;

                // 清空角色
                document.getElementById('characters').innerHTML = '';

                // 显示第一个对话
                this.showDialogue();
            },

            // 显示对话
            showDialogue() {
                const dialogue = this.currentScene.dialogues[this.dialogueIndex];
                if (!dialogue) {
                    // 显示选项
                    this.showChoices();
                    return;
                }

                document.getElementById('speaker-name').textContent = dialogue.speaker;
                this.typeText(dialogue.text);
            },

            // 打字效果
            typeText(text) {
                const textElement = document.getElementById('dialogue-text');
                textElement.textContent = '';
                this.isTyping = true;

                let index = 0;
                const type = () => {
                    if (index < text.length) {
                        textElement.textContent += text[index];
                        index++;
                        this.typingTimeout = setTimeout(type, 30);
                    } else {
                        this.isTyping = false;
                    }
                };
                type();
            },

            // 跳过打字效果
            skipTyping() {
                if (this.isTyping) {
                    clearTimeout(this.typingTimeout);
                    const dialogue = this.currentScene.dialogues[this.dialogueIndex];
                    document.getElementById('dialogue-text').textContent = dialogue.text;
                    this.isTyping = false;
                }
            },

            // 下一个对话
            nextDialogue() {
                if (this.isTyping) {
                    this.skipTyping();
                    return;
                }

                this.dialogueIndex++;
                this.showDialogue();
            },

            // 显示选项
            showChoices() {
                const choicesContainer = document.getElementById('choices-container');
                choicesContainer.innerHTML = '';

                if (this.currentScene.ending) {
                    this.showEnding();
                    return;
                }

                if (this.currentScene.choices) {
                    this.currentScene.choices.forEach(choice => {
                        const btn = document.createElement('button');
                        btn.className = 'choice-btn';
                        btn.textContent = choice.text;
                        btn.onclick = (e) => {
                            e.stopPropagation();
                            this.selectChoice(choice.next);
                        };
                        choicesContainer.appendChild(btn);
                    });
                    choicesContainer.style.display = 'flex';
                }
            },

            // 选择选项
            selectChoice(nextScene) {
                document.getElementById('choices-container').style.display = 'none';
                this.saveProgress();
                this.loadScene(nextScene);
            },

            // 显示结局
            showEnding() {
                document.getElementById('dialogue-box').classList.add('hidden');
                document.getElementById('choices-container').style.display = 'none';
                document.getElementById('menu-buttons').classList.add('hidden');

                const endingScreen = document.getElementById('ending-screen');
                document.getElementById('ending-title').textContent = this.currentScene.endingTitle;
                document.getElementById('ending-text').textContent = this.currentScene.endingText;
                endingScreen.style.display = 'flex';

                this.saveProgress();
            },

            // 存档
            saveProgress(slot = 1) {
                const saveData = {
                    currentScene: this.currentScene ? this.currentScene : 'start',
                    dialogueIndex: this.dialogueIndex,
                    flags: this.flags,
                    inventory: this.inventory,
                    timestamp: new Date().toLocaleString()
                };

                const saves = JSON.parse(localStorage.getItem('pseudoHumanSaves') || '{}');
                saves[slot] = saveData;
                localStorage.setItem('pseudoHumanSaves', JSON.stringify(saves));
            },

            // 读档
            loadProgress(slot = null) {
                if (slot) {
                    const saves = JSON.parse(localStorage.getItem('pseudoHumanSaves') || '{}');
                    const saveData = saves[slot];
                    if (saveData) {
                        this.currentScene = scenes[saveData.currentScene] || scenes['start'];
                        this.dialogueIndex = saveData.dialogueIndex || 0;
                        this.flags = saveData.flags || {};
                        this.inventory = saveData.inventory || [];
                        return true;
                    }
                }
                return false;
            },

            // 显示存档面板
            showSavePanel() {
                this.showPanel('save');
            },

            // 显示读档面板
            showLoadPanel() {
                this.showPanel('load');
            },

            // 显示面板
            showPanel(type) {
                const panel = document.getElementById('save-load-panel');
                const title = document.getElementById('panel-title');
                const slotsContainer = document.getElementById('save-slots');

                title.textContent = type === 'save' ? '存档' : '读档';
                slotsContainer.innerHTML = '';

                const saves = JSON.parse(localStorage.getItem('pseudoHumanSaves') || '{}');

                for (let i = 1; i <= gameData.saveSlots; i++) {
                    const slot = document.createElement('div');
                    slot.className = 'save-slot';

                    const saveData = saves[i];
                    if (saveData) {
                        slot.innerHTML = `
                            <div class="slot-number">存档 ${i}</div>
                            <div class="slot-info">场景：${saveData.currentScene}</div>
                            <div class="slot-time">${saveData.timestamp}</div>
                        `;
                    } else {
                        slot.innerHTML = `
                            <div class="slot-number">存档 ${i}</div>
                            <div class="slot-info">空</div>
                        `;
                    }

                    slot.onclick = () => {
                        if (type === 'save') {
                            this.saveProgress(i);
                            alert('存档成功！');
                            this.closePanel();
                        } else {
                            if (this.loadProgress(i)) {
                                this.closePanel();
                                document.getElementById('title-screen').classList.add('hidden');
                                document.getElementById('menu-buttons').classList.remove('hidden');
                                document.getElementById('dialogue-box').classList.remove('hidden');
                                this.showDialogue();
                            } else {
                                alert('该存档位为空！');
                            }
                        }
                    };

                    slotsContainer.appendChild(slot);
                }

                panel.style.display = 'block';
            },

            // 关闭面板
            closePanel() {
                document.getElementById('save-load-panel').style.display = 'none';
            },

            // 返回标题
            toTitle() {
                document.getElementById('ending-screen').style.display = 'none';
                document.getElementById('save-load-panel').style.display = 'none';
                document.getElementById('title-screen').classList.remove('hidden');
                document.getElementById('menu-buttons').classList.add('hidden');
                document.getElementById('dialogue-box').classList.add('hidden');
                document.getElementById('choices-container').style.display = 'none';
                this.currentScene = null;
            },

            // 显示制作信息
            showCredits() {
                alert('伪人大本营\n\n一个橙光游戏风格的互动视觉小说\n\n故事：AI 生成\n程序：AI 生成\n\n感谢游玩！');
            }
        };

        // 初始化游戏
        game.init();
    </script>
